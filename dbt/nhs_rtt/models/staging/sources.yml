# ─────────────────────────────────────────────────────────────────────────────
# dbt Source Definitions — NHS RTT Raw Data
# ─────────────────────────────────────────────────────────────────────────────
# Sources tell dbt where the raw data lives in BigQuery.
# By defining sources here rather than hardcoding table names in models,
# we get:
#   - Automatic lineage tracking (dbt knows data came from BigQuery raw)
#   - Source freshness testing (alert if raw data is stale)
#   - A single place to update if table names ever change

version: 2

sources:
  - name: nhs_rtt_raw
    description: >
      Raw NHS Referral To Treatment waiting times data loaded directly
      from NHS England statistical releases. Data is loaded monthly,
      unmodified, exactly as published by NHS England.
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: nhs_rtt_raw
    loader: airflow
    loaded_at_field: _loaded_at

    freshness:
      warn_after: { count: 35, period: day }
      error_after: { count: 40, period: day }

    tables:
      - name: rtt_full_extract
        description: >
          Full monthly extract of NHS RTT waiting times data.
          One row per provider-commissioner-specialty-pathway combination.
          Contains 104 weekly wait band columns plus summary totals.
          Source: NHS England statistical releases.
          URL: https://www.england.nhs.uk/statistics/statistical-work-areas/rtt-waiting-times/
        columns:
          - name: Period
            description: >
              Reporting period in format RTT-MonthYear (e.g. RTT-January-2026).
              Always a single value per monthly file.
          - name: Provider Org Code
            description: NHS ODS code for the provider trust. 517 unique providers.
            tests:
              - not_null
          - name: RTT Part Type
            description: >
              Pathway type code. Part_2 = Incomplete (18-week target).
              Part_1A = Admitted. Part_1B = Non-Admitted. Part_3 = New periods.
            tests:
              - not_null
              - accepted_values:
                  values: ["Part_1A", "Part_1B", "Part_2", "Part_2A", "Part_3"]
          - name: Total All
            description: >
              Total patient count for this row. Never null.
              Primary patient count metric.
            tests:
              - not_null
